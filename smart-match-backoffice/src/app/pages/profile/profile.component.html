<section class="page-hero-compact">
  <div>
    <span class="eyebrow">Account</span>
    <h1>Profile</h1>
    <p>Manage recruiter information and company details.</p>
  </div>
</section>

<section class="profile-grid">
  <mat-card class="form-card">
    <mat-card-title>Recruiter profile</mat-card-title>
    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
      <mat-form-field appearance="outline"><mat-label>Position</mat-label><input matInput formControlName="position"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Phone</mat-label><input matInput formControlName="phone"></mat-form-field>
      <button mat-flat-button color="primary" type="submit">Save profile</button>
    </form>
  </mat-card>
  <mat-card class="form-card">
    <mat-card-title>Company</mat-card-title>
    @if (company) { <mat-chip>{{ company.validationStatus }}</mat-chip> }
    <form [formGroup]="companyForm" (ngSubmit)="saveCompany()">
      <mat-form-field appearance="outline"><mat-label>Name</mat-label><input matInput formControlName="name"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Sector</mat-label><input matInput formControlName="sector"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Description</mat-label><textarea matInput rows="4" formControlName="description"></textarea></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Logo URL</mat-label><input matInput formControlName="logoUrl"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Website</mat-label><input matInput formControlName="website"></mat-form-field>
      <button mat-flat-button color="primary" type="submit">{{ company ? 'Update company' : 'Create company' }}</button>
    </form>
  </mat-card>
</section>
