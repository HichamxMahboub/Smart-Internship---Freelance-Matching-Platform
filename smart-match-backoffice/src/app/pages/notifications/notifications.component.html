<header class="page-header"><div><h1>Notifications</h1><p>Operational messages from applications, companies, subscriptions and AI.</p></div><button mat-flat-button color="primary" (click)="markAll()">Mark all read</button></header>
<section class="notification-list">@for (item of notifications(); track item.id) { <mat-card [class.unread]="!item.read"><mat-card-header><mat-icon mat-card-avatar>{{ item.read ? 'drafts' : 'mark_email_unread' }}</mat-icon><mat-card-title>{{ item.title }}</mat-card-title><mat-card-subtitle>{{ item.type }} · {{ item.createdAt | date:'short' }}</mat-card-subtitle></mat-card-header><mat-card-content>{{ item.message }}</mat-card-content><mat-card-actions align="end"><button mat-button [disabled]="item.read" (click)="markRead(item)">Mark read</button></mat-card-actions></mat-card> }</section>
