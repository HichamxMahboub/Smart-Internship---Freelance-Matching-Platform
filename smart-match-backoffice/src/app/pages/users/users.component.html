<header class="page-header"><h1>Users</h1><p>Manage platform accounts and access.</p></header>
<div class="toolbar-row">
  <mat-form-field appearance="outline"><mat-label>Search</mat-label><input matInput [(ngModel)]="search"></mat-form-field>
  <mat-form-field appearance="outline"><mat-label>Role</mat-label><mat-select [(ngModel)]="role"><mat-option value="">All</mat-option><mat-option value="ADMIN">Admin</mat-option><mat-option value="RECRUITER">Recruiter</mat-option><mat-option value="CANDIDATE">Candidate</mat-option></mat-select></mat-form-field>
</div>
<mat-card><table mat-table [dataSource]="filteredUsers()"><ng-container matColumnDef="fullName"><th mat-header-cell *matHeaderCellDef>Name</th><td mat-cell *matCellDef="let user">{{ user.fullName }}</td></ng-container><ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let user">{{ user.email }}</td></ng-container><ng-container matColumnDef="role"><th mat-header-cell *matHeaderCellDef>Role</th><td mat-cell *matCellDef="let user">{{ user.role }}</td></ng-container><ng-container matColumnDef="plan"><th mat-header-cell *matHeaderCellDef>Plan</th><td mat-cell *matCellDef="let user">{{ user.plan }}</td></ng-container><ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let user"><mat-chip>{{ user.active ? 'ACTIVE' : 'DISABLED' }}</mat-chip></td></ng-container><ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef></th><td mat-cell *matCellDef="let user"><button mat-button (click)="setStatus(user)">{{ user.active ? 'Deactivate' : 'Activate' }}</button></td></ng-container><tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let row; columns: displayedColumns"></tr></table></mat-card>
