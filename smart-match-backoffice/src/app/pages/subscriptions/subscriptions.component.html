<header class="page-header"><h1>Subscriptions</h1><p>Premium plans and subscription lifecycle.</p></header>
<mat-card><table mat-table [dataSource]="subscriptions()"><ng-container matColumnDef="userId"><th mat-header-cell *matHeaderCellDef>User</th><td mat-cell *matCellDef="let item">{{ item.userId }}</td></ng-container><ng-container matColumnDef="plan"><th mat-header-cell *matHeaderCellDef>Plan</th><td mat-cell *matCellDef="let item">{{ item.plan }}</td></ng-container><ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let item"><mat-chip>{{ item.status }}</mat-chip></td></ng-container><ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Active</th><td mat-cell *matCellDef="let item">{{ item.active ? 'Yes' : 'No' }}</td></ng-container><ng-container matColumnDef="expirationDate"><th mat-header-cell *matHeaderCellDef>Expires</th><td mat-cell *matCellDef="let item">{{ item.expirationDate | date:'mediumDate' }}</td></ng-container><tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let row; columns: displayedColumns"></tr></table></mat-card>
