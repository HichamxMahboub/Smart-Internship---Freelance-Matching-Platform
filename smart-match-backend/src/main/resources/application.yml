server:
  port: 8080

spring:
  application:
    name: smart-match-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/smart_match}
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:5MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:5MB}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

smartmatch:
  upload:
    cv-dir: ${APP_CV_UPLOAD_DIR:/uploads/cv}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    image-folder: ${CLOUDINARY_IMAGE_FOLDER:interlance/images}
    resume-folder: ${CLOUDINARY_RESUME_FOLDER:interlance/resumes}
  ai:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:deepseek/deepseek-chat-v3-0324:free}
    max-tokens: ${OPENROUTER_MAX_TOKENS:1024}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    referer: ${OPENROUTER_REFERER:https://interlance.app}
    title: ${OPENROUTER_TITLE:Interlance}
  assistant:
    n8n-url: ${ASSISTANT_N8N_URL:http://n8n:5678/webhook/interlance-assistant}
    scoring-n8n-url: ${ASSISTANT_SCORING_N8N_URL:http://n8n:5678/webhook/interlance-cv-score}
    candidate-match-url: ${ASSISTANT_CANDIDATE_MATCH_URL:http://n8n:5678/webhook/interlance-candidate-match}
    recruiter-match-url: ${ASSISTANT_RECRUITER_MATCH_URL:http://n8n:5678/webhook/interlance-recruiter-match}
    timeout-seconds: ${ASSISTANT_TIMEOUT_SECONDS:120}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    currency: ${STRIPE_CURRENCY:usd}
    success-url: ${STRIPE_SUCCESS_URL:https://interlance.app/pay/success}
    cancel-url: ${STRIPE_CANCEL_URL:https://interlance.app/pay/cancel}
    premium-amount: ${STRIPE_PREMIUM_AMOUNT:99}

app:
  payment:
    webhook-secret: ${APP_PAYMENT_WEBHOOK_SECRET:${PAYMENT_WEBHOOK_SECRET:}}
  seed:
    enabled: ${APP_SEED_ENABLED:false}

logging:
  level:
    com.smartmatch: INFO
