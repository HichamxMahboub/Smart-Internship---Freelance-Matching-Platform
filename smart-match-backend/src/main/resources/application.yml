server:
  port: 8080

spring:
  application:
    name: smart-match-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/smart_match}
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:5MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:5MB}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

smartmatch:
  upload:
    cv-dir: ${APP_CV_UPLOAD_DIR:/uploads/cv}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    image-folder: ${CLOUDINARY_IMAGE_FOLDER:interlance/images}
    resume-folder: ${CLOUDINARY_RESUME_FOLDER:interlance/resumes}
  ai:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openrouter/free}
    max-tokens: ${OPENROUTER_MAX_TOKENS:1024}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    referer: ${OPENROUTER_REFERER:https://interlance.app}
    title: ${OPENROUTER_TITLE:Interlance}

app:
  payment:
    webhook-secret: ${APP_PAYMENT_WEBHOOK_SECRET:${PAYMENT_WEBHOOK_SECRET:}}
  seed:
    enabled: ${APP_SEED_ENABLED:false}

logging:
  level:
    com.smartmatch: INFO
