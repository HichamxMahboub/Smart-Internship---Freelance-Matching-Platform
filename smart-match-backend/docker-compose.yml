services:
  mongodb:
    image: mongo:7
    container_name: smart-match-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - smart_match_mongodb_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: smart-match-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}

  backend:
    build: .
    container_name: smart-match-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/smart_match
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      APP_PAYMENT_WEBHOOK_SECRET: ${APP_PAYMENT_WEBHOOK_SECRET}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_CV_UPLOAD_DIR: /uploads/cv
    volumes:
      - ./uploads:/uploads
      - ./firebase-service-account.json:/run/secrets/firebase-service-account.json:ro

volumes:
  smart_match_mongodb_data:
