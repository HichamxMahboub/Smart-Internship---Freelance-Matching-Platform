apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-match-backend
  namespace: smart-match
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-match-backend
  template:
    metadata:
      labels:
        app: smart-match-backend
    spec:
      containers:
        - name: backend
          image: smart-match-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: smart-match-backend-config
            - secretRef:
                name: smart-match-backend-secret
          volumeMounts:
            - name: uploads
              mountPath: /uploads
          readinessProbe:
            httpGet:
              path: /swagger-ui.html
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /swagger-ui.html
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: smart-match-uploads-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smart-match-uploads-pvc
  namespace: smart-match
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
