services:
  mongodb:
    image: mongo:7
    container_name: smart-match-platform-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - smart_match_mongodb_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: smart-match-platform-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false

  backend:
    build:
      context: ./smart-match-backend
    container_name: smart-match-platform-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/smart_match
      MONGODB_URI: mongodb://mongodb:27017/smart_match
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-/run/secrets/firebase-service-account.json}
      APP_PAYMENT_WEBHOOK_SECRET: ${APP_PAYMENT_WEBHOOK_SECRET:-dev-payment-secret}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_CV_UPLOAD_DIR: /uploads/cv
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-1024}
      ASSISTANT_N8N_URL: ${ASSISTANT_N8N_URL:-http://n8n:5678/webhook/interlance-assistant}
      ASSISTANT_SCORING_N8N_URL: ${ASSISTANT_SCORING_N8N_URL:-http://n8n:5678/webhook/interlance-cv-score}
      ASSISTANT_CANDIDATE_MATCH_URL: ${ASSISTANT_CANDIDATE_MATCH_URL:-http://n8n:5678/webhook/interlance-candidate-match}
      ASSISTANT_RECRUITER_MATCH_URL: ${ASSISTANT_RECRUITER_MATCH_URL:-http://n8n:5678/webhook/interlance-recruiter-match}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_IMAGE_FOLDER: ${CLOUDINARY_IMAGE_FOLDER:-interlance/images}
      CLOUDINARY_RESUME_FOLDER: ${CLOUDINARY_RESUME_FOLDER:-interlance/resumes}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://interlance.app/pay/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://interlance.app/pay/cancel}
      STRIPE_PREMIUM_AMOUNT: ${STRIPE_PREMIUM_AMOUNT:-99}
    volumes:
      - smart_match_uploads:/uploads
      - ./smart-match-backend/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro

  backoffice:
    build:
      context: ./smart-match-backoffice
    container_name: smart-match-platform-backoffice
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: smart-match-platform-n8n
    restart: unless-stopped
    depends_on:
      - mongodb
      - backend
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Africa/Casablanca
      TZ: Africa/Casablanca
      N8N_SECURE_COOKIE: "false"
    volumes:
      - smart_match_n8n_data:/home/node/.n8n

volumes:
  smart_match_mongodb_data:
  smart_match_uploads:
  smart_match_n8n_data:
